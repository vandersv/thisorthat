:root{
  --yellow:#FFF100; --black:#000; --blue:#C2CED9; --grey:#DFE0DF; --white:#fff;
  --ui-blue:#265BDE; --ui-green:#358600; --ui-red:#E71D36;
  --font:'Bryant Condensed','Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji', system-ui, sans-serif;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font); background:var(--black); color:var(--black);
  overflow:hidden; -webkit-font-smoothing:antialiased;
}
#app{height:100%; width:100%}
.hidden{display:none !important}

/* ---------- shared bits ---------- */
.brandbar{position:fixed; top:0; left:0; right:0; height:8px; background:var(--yellow); z-index:50}
.bee{width:1em; height:1em; vertical-align:-0.12em; fill:currentColor}
button{font-family:var(--font); cursor:pointer; border:none}
.btn{
  background:var(--yellow); color:#000; border:2px solid #000; border-radius:9999px;
  font-weight:700; font-size:20px; letter-spacing:-0.4px; padding:14px 30px; transition:.12s;
}
.btn:hover{background:#fff}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent; color:#fff; border-color:#fff}
.btn.ghost:hover{background:#fff; color:#000}
.flav{font-size:13px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; opacity:.55}

/* ============================================================ JOIN ===== */
#join{height:100%; background:var(--yellow); display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:32px; text-align:center}
#join .bee{width:64px; height:64px; margin-bottom:8px; animation:bob 2.4s ease-in-out infinite}
@keyframes bob{50%{transform:translateY(-10px) rotate(-6deg)}}
#join h1{font-size:clamp(44px,13vw,84px); font-weight:700; letter-spacing:-2px; line-height:.9}
#join h1 em{font-style:normal; display:block; -webkit-text-stroke:2px #000; color:transparent}
#join p{font-weight:500; font-size:18px; margin:14px 0 28px; max-width:320px}
#nameForm{width:100%; max-width:340px}
#nameInput{width:100%; height:60px; border:2px solid #000; border-radius:14px; background:#fff;
  font-family:var(--font); font-size:24px; font-weight:500; text-align:center; padding:0 16px; margin-bottom:14px}
#nameInput:focus{outline:none; box-shadow:0 0 0 4px rgba(0,0,0,.15)}
#join .btn{width:100%; height:60px; font-size:24px; background:#000; color:var(--yellow); border-color:#000}
#join .btn:hover{background:#222}

/* ============================================================ VOTER ==== */
#voter{height:100%; display:flex; flex-direction:column; background:var(--black); color:#fff}
#voter .vtop{padding:20px 20px 8px; display:flex; justify-content:space-between; align-items:center}
#voter .who{font-weight:700; font-size:18px}
#voter .who .dot{display:inline-block; width:9px; height:9px; border-radius:50%; background:var(--ui-green); margin-right:7px; vertical-align:1px}
#voter .vflav{margin-left:auto}
#voter .vmid{flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 18px}
#voter .vq{text-align:center; font-weight:700; font-size:clamp(26px,7vw,40px); letter-spacing:-1px; line-height:1; margin-bottom:22px; min-height:1.2em}
#choices{display:flex; flex-direction:column; gap:16px}
.choice{position:relative; border:none; border-radius:22px; padding:30px 22px; text-align:left;
  font-family:var(--font); display:flex; align-items:center; gap:18px; transition:.15s; overflow:hidden}
.choice .e{font-size:46px; line-height:1}
.choice .l{font-weight:700; font-size:26px; letter-spacing:-0.6px; line-height:.98}
.choice.A{background:var(--yellow); color:#000}
.choice.B{background:#fff; color:#000}
.choice:active{transform:scale(.98)}
.choice.picked{box-shadow:0 0 0 5px var(--ui-green), 0 0 0 9px rgba(53,134,0,.25)}
.choice.dim{opacity:.35}
.choice .tick{position:absolute; top:12px; right:16px; font-size:26px; opacity:0; transition:.2s}
.choice.picked .tick{opacity:1}
#voter .vbot{padding:16px 20px 30px; text-align:center; min-height:84px}
#voter .status{font-weight:500; font-size:17px; opacity:.7}
#voter .bigstate{font-weight:700; font-size:clamp(30px,9vw,48px); letter-spacing:-1px; line-height:.95}
.lobbywrap{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; gap:12px}
.pulse{width:18px;height:18px;border-radius:50%;background:var(--yellow);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(.7);opacity:.5}50%{transform:scale(1.2);opacity:1}}

/* ============================================================ ROOM ===== */
#room{height:100%; background:var(--yellow); color:#000; display:flex; flex-direction:column; position:relative}
#room .rtop{display:flex; align-items:center; gap:16px; padding:26px 40px 0}
#room .rlogo{font-weight:700; font-size:30px; letter-spacing:-1px; display:flex; align-items:center; gap:10px}
#room .rlogo .bee{width:34px;height:34px}
#room .rcount{margin-left:auto; font-weight:700; font-size:22px; background:#000; color:var(--yellow); padding:8px 20px; border-radius:9999px}
#room .rmid{flex:1; display:flex; flex-direction:column; justify-content:center; padding:10px 56px}
#room .rflav{text-align:center; margin-bottom:10px}
#room .rq{text-align:center; font-weight:700; font-size:clamp(40px,6.5vw,84px); letter-spacing:-2px; line-height:.92; margin-bottom:30px}
#bars{display:flex; gap:24px; align-items:stretch; height:min(42vh,360px)}
.bar{flex:1; position:relative; border:3px solid #000; border-radius:26px; overflow:hidden; background:rgba(255,255,255,.35); display:flex; flex-direction:column; justify-content:flex-end}
.bar .fill{position:absolute; left:0; right:0; bottom:0; transition:height .6s cubic-bezier(.2,.8,.2,1)}
.bar.A .fill{background:#000}
.bar.B .fill{background:#fff; border-top:3px solid #000}
.bar .inner{position:relative; z-index:2; padding:22px; display:flex; flex-direction:column; height:100%; justify-content:space-between}
.bar .be{font-size:54px; line-height:1}
.bar.A .be, .bar.A .blabel{color:#fff; mix-blend-mode:difference}
.bar .blabel{font-weight:700; font-size:30px; letter-spacing:-0.8px; line-height:.95}
.bar .bpct{font-weight:700; font-size:clamp(40px,7vw,86px); letter-spacing:-2px; line-height:.85}
.bar .bcount{font-weight:500; font-size:18px; opacity:.7}
.bar .names{font-weight:500; font-size:17px; line-height:1.25; max-height:0; opacity:0; overflow:hidden; transition:.4s; margin-top:6px}
.bar.reveal .names{max-height:30vh; opacity:1}
.bar.A .names{color:#fff}
.callout{text-align:center; font-weight:700; font-size:clamp(22px,3.2vw,34px); letter-spacing:-0.8px;
  margin-top:24px; min-height:1.2em; opacity:0; transition:.4s}
.callout.show{opacity:1}
.callout .pill{background:#000; color:var(--yellow); padding:2px 14px; border-radius:9999px; display:inline-block}
/* QR join panel */
#qr{position:absolute; bottom:30px; right:40px; background:#000; color:#fff; border-radius:20px; padding:18px; text-align:center; width:210px}
#qr .qrbox{width:170px;height:170px; background:#fff; border-radius:10px; display:flex; align-items:center; justify-content:center; padding:8px; margin:0 auto 10px}
#qr .qrbox svg{width:100%;height:100%;display:block; shape-rendering:crispEdges}
#qr .qurl{font-weight:700; font-size:16px; word-break:break-all; line-height:1.1}
#qr .qcap{font-weight:700; font-size:14px; letter-spacing:1px; text-transform:uppercase; color:var(--yellow); margin-bottom:8px}
#room.voting #qr{width:150px} #room.voting #qr .qrbox{width:120px;height:120px}

/* room lobby + awards */
.roomLobby{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:18px}
.roomLobby h2{font-size:clamp(50px,9vw,120px); font-weight:700; letter-spacing:-3px; line-height:.85}
.roomLobby h2 em{font-style:normal; display:block; -webkit-text-stroke:3px #000; color:transparent}
.joinline{font-weight:700; font-size:26px}
.joinline b{background:#000;color:var(--yellow);padding:4px 16px;border-radius:9999px}
#awards{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:40px}
#awards h2{font-size:clamp(46px,8vw,96px); font-weight:700; letter-spacing:-3px}
.awardgrid{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:20px; width:min(1100px,92vw)}
.award{background:#000; color:#fff; border-radius:22px; padding:24px 28px; text-align:left}
.award .at{font-weight:700; font-size:26px; letter-spacing:-0.6px; color:var(--yellow)}
.award .aw{font-weight:700; font-size:40px; letter-spacing:-1px; line-height:.95; margin:4px 0}
.award .ad{font-weight:500; font-size:17px; opacity:.7}

/* ============================================================ HOST ===== */
#host{height:100%; background:#111; color:#fff; display:flex; flex-direction:column; padding:14px; gap:12px; overflow:hidden}
#host .hbar{display:flex; align-items:center; gap:12px}
#host .hbar .htitle{font-weight:700; font-size:22px; letter-spacing:-0.5px}
#host .hbar .hcount{margin-left:auto; font-weight:700; background:var(--yellow); color:#000; padding:6px 16px; border-radius:9999px}
#host .hcard{background:#000; border:2px solid #333; border-radius:18px; padding:16px 18px}
#host .hflav{display:flex; gap:8px; align-items:center; margin-bottom:6px}
#host .hflav .spicy{background:var(--ui-red); color:#fff; font-size:11px; font-weight:700; padding:2px 8px; border-radius:9999px; letter-spacing:1px}
#host .hq{font-weight:700; font-size:26px; letter-spacing:-0.8px; line-height:1}
#host .hq .vs{opacity:.45; margin:0 8px; font-size:18px}
#host .hnote{font-weight:500; font-size:15px; color:var(--yellow); margin-top:8px; line-height:1.2}
#host .hsplit{display:flex; gap:12px; margin-top:14px}
#host .hside{flex:1; background:#1c1c1c; border-radius:14px; padding:12px 14px}
#host .hside .sl{font-weight:700; font-size:18px; display:flex; justify-content:space-between}
#host .hside .sl .n{font-size:30px; letter-spacing:-1px}
#host .hside .names{font-weight:500; font-size:15px; line-height:1.35; margin-top:6px; color:#bbb}
#host .hside.lead{outline:2px solid var(--yellow)}
#host .calloutbox{background:var(--yellow); color:#000; border-radius:14px; padding:12px 16px; font-weight:700; font-size:18px; margin-top:12px; min-height:50px}
#host .waiting{font-weight:500; font-size:14px; color:#888; margin-top:10px; line-height:1.3}
#host .controls{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
#host .controls .btn{font-size:17px; padding:12px 20px}
#host .btn.dark{background:#000;color:#fff;border-color:#555}
#host .btn.dark:hover{background:#333;color:#fff}
#host .btn.on{background:var(--ui-green);color:#fff;border-color:var(--ui-green)}
#host .deck{flex:1; overflow-y:auto; background:#000; border:2px solid #333; border-radius:18px; padding:8px}
#host .drow{display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:10px; cursor:pointer; font-weight:500}
#host .drow:hover{background:#1c1c1c}
#host .drow.cur{background:var(--yellow); color:#000; font-weight:700}
#host .drow .di{width:26px; text-align:center; opacity:.6; font-size:14px}
#host .drow .dq{flex:1; font-size:16px; letter-spacing:-0.3px}
#host .drow .dot{font-size:12px}
#host .toggle{display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px}

/* connection toast */
#toast{position:fixed; bottom:14px; left:50%; transform:translateX(-50%); background:#000; color:#fff;
  font-weight:700; font-size:14px; padding:8px 18px; border-radius:9999px; z-index:99; opacity:0; transition:.3s; border:1px solid #333}
#toast.show{opacity:1}
#toast.err{background:var(--ui-red)}
</style>
</head>

<div id="app"></div>

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {
            p = ' ';
          }

          if (min <= x && x < max && min <= y+1 && y+1 < max && _this.isDark(r2, Math.floor((x - min) / cellSize))) {
            p += ' ';
          }
          else {
            p += '█';
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          ascii += (margin < 1 && y+1 >= max) ? blocksLastLineNoMargin[p] : blocks[p];
        }

        ascii += '\n';
      }

      if (size % 2 && margin > 0) {
        return ascii.substring(0, ascii.length - size - 1) + Array(size+1).join('▀');
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.createASCII = function(cellSize, margin) {
      cellSize = cellSize || 1;

      if (cellSize < 2) {
        return _createHalfASCII(margin);
      }

      cellSize -= 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r, p;

      var white = Array(cellSize+1).join('██');
      var black = Array(cellSize+1).join('  ');

      var ascii = '';
      var line = '';
      for (y = 0; y < size; y += 1) {
        r = Math.floor( (y - min) / cellSize);
        line = '';
        for (x = 0; x < size; x += 1) {
          p = 1;

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r, Math.floor((x - min) / cellSize))) {
            p = 0;
          }

          // Output 2 characters per pixel, to create full square. 1 character per pixels gives only half width of square.
          line += p ? white : black;
        }

        for (r = 0; r < cellSize; r += 1) {
          ascii += line + '\n';
        }
      }

      return ascii.substring(0, ascii.length-1);
    };

    _this.renderTo2dContext = function(context, cellSize) {
      cellSize = cellSize || 2;
      var length = _this.getModuleCount();
      for (var row = 0; row < length; row++) {
        for (var col = 0; col < length; col++) {
          context.fillStyle = _this.isDark(row, col) ? 'black' : 'white';
          context.fillRect(row * cellSize, col * cellSize, cellSize, cellSize);
        }
      }
    }

    return _this;
  };

  //---------------------------------------------------------------------
  // qrcode.stringToBytes
  //---------------------------------------------------------------------

  qrcode.stringToBytesFuncs = {
    'default' : function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        bytes.push(c & 0xff);
      }
      return bytes;
    }
  };

  qrcode.stringToBytes = qrcode.stringToBytesFuncs['default'];

  //---------------------------------------------------------------------
  // qrcode.createStringToBytes
  //---------------------------------------------------------------------

  /**
   * @param unicodeData base64 string of byte array.
   * [16bit Unicode],[16bit Bytes], ...
   * @param numChars
   */
  qrcode.createStringToBytes = function(unicodeData, numChars) {

    // create conversion map.

    var unicodeMap = function() {

      var bin = base64DecodeInputStream(unicodeData);
      var read = function() {
        var b = bin.read();
        if (b == -1) throw 'eof';
        return b;
      };

      var count = 0;
      var unicodeMap = {};
      while (true) {
        var b0 = bin.read();
        if (b0 == -1) break;
        var b1 = read();
        var b2 = read();
        var b3 = read();
        var k = String.fromCharCode( (b0 << 8) | b1);
        var v = (b2 << 8) | b3;
        unicodeMap[k] = v;
        count += 1;
      }
      if (count != numChars) {
        throw count + ' != ' + numChars;
      }

      return unicodeMap;
    }();

    var unknownChar = '?'.charCodeAt(0);

    return function(s) {
      var bytes = [];
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charCodeAt(i);
        if (c < 128) {
          bytes.push(c);
        } else {
          var b = unicodeMap[s.charAt(i)];
          if (typeof b == 'number') {
            if ( (b & 0xff) == b) {
              // 1byte
              bytes.push(b);
            } else {
              // 2bytes
              bytes.push(b >>> 8);
              bytes.push(b & 0xff);
            }
          } else {
            bytes.push(unknownChar);
          }
        }
      }
      return bytes;
    };
  };

  //---------------------------------------------------------------------
  // QRMode
  //---------------------------------------------------------------------

  var QRMode = {
    MODE_NUMBER :    1 << 0,
    MODE_ALPHA_NUM : 1 << 1,
    MODE_8BIT_BYTE : 1 << 2,
    MODE_KANJI :     1 << 3
  };

  //---------------------------------------------------------------------
  // QRErrorCorrectionLevel
  //---------------------------------------------------------------------

  var QRErrorCorrectionLevel = {
    L : 1,
    M : 0,
    Q : 3,
    H : 2
  };

  //---------------------------------------------------------------------
  // QRMaskPattern
  //---------------------------------------------------------------------

  var QRMaskPattern = {
    PATTERN000 : 0,
    PATTERN001 : 1,
    PATTERN010 : 2,
    PATTERN011 : 3,
    PATTERN100 : 4,
    PATTERN101 : 5,
    PATTERN110 : 6,
    PATTERN111 : 7
  };

  //---------------------------------------------------------------------
  // QRUtil
  //---------------------------------------------------------------------

  var QRUtil = function() {

    var PATTERN_POSITION_TABLE = [
      [],
      [6, 18],
      [6, 22],
      [6, 26],
      [6, 30],
      [6, 34],
      [6, 22, 38],

      [6, 26, 46],
      [6, 28, 50],
      [6, 30, 54],
      [6, 32, 58],
      [6, 34, 62],
      [6, 26, 46, 66],
      [6, 26, 48, 70],
      [6, 26, 50, 74],
      [6, 30, 54, 78],
      [6, 30, 56, 82],
      [6, 30, 58, 86],
      [6, 34, 62, 90],
      [6, 28, 50, 72, 94],
      [6, 26, 50, 74, 98],
      [6, 30, 54, 78, 102],
      [6, 28, 54, 80, 106],
      [6, 32, 58, 84, 110],
      [6, 30, 58, 86, 114],
      [6, 34, 62, 90, 118],
      [6, 26, 50, 74, 98, 122],
      [6, 30, 54, 78, 102, 126],
      [6, 26, 52, 78, 104, 130],

  });
  // oracle: predict cards — guess matches actual majority
  const oracle={}; ids.forEach(id=>oracle[id]=0); let predictPlayed=0;
  CARDS.forEach((c,i)=>{ if(c.type!=='predict')return; const t=tally(i); if(t.total<2)return; predictPlayed++;
    const maj = t.A.length>=t.B.length?'A':'B';
    Object.entries(votesFor(i)).forEach(([id,x])=>{ if(x.choice===maj) oracle[id]++; });
  });
  const top=(obj)=>{let bk=null,bv=-1;for(const k in obj){if(obj[k]>bv){bv=obj[k];bk=k;}}return bv>0?{k:bk,v:bv}:null;};
  const contrarian=top(minorityCount), hot=top(lonely), oracleW=predictPlayed?top(oracle):null;
  let twins=null,tv=-1; for(const k in both){ if(both[k]>=Math.max(3,played.length*0.5)){ const r=(agree[k]||0)/both[k]; if(r>tv){tv=r;twins=k;} } }
  return {
    contrarian: contrarian&&{name:names[contrarian.k], detail:`went against the room ${contrarian.v}×`},
    hot:        hot&&{name:names[hot.k], detail:`stood completely alone ${hot.v}×`},
    oracle:     oracleW&&{name:names[oracleW.k], detail:`read the team right ${oracleW.v}×`},
    twins:      twins&&{name:twins.split('|').map(id=>names[id]).join(' & '), detail:`agreed ${Math.round(tv*100)}% of the time`},
  };
}

// ===========================================================================
//  RENDER
// ===========================================================================
// signature of everything the UI depends on — lets the safety poll skip
// redundant full re-renders (which would otherwise destroy buttons/inputs
// every few seconds and swallow a click or tap mid-interaction).
function stateSig(){
  const v=votesFor(game.idx);
  return [ROLE, !!me, game.phase, game.idx, game.reveal_names, players.length,
          Object.keys(v).length, Object.values(v).map(x=>x.choice).sort().join('')].join('|');
}
let lastSig=null;
function render(){ ({join:renderJoin, room:renderRoom, host:renderHost}[ROLE]||renderJoin)(); lastSig=stateSig(); }

// ---------- JOIN / VOTER ----------
function renderJoin(){
  if(!me){ return renderNameScreen(); }
  renderVoter();
}
function renderNameScreen(){
  APP.innerHTML=`
   <div id="join">
     ${BEE}
     <h1>This<br><em>or That</em></h1>
     <p>Pop your name in. Then it's all on your phone — tap your side, watch the room split.</p>
     <form id="nameForm" autocomplete="off">
       <input id="nameInput" maxlength="18" placeholder="Your first name" autofocus />
       <button class="btn" type="submit">I'm in →</button>
     </form>
   </div>`;
  $('#nameForm').onsubmit=async e=>{
    e.preventDefault();
    const name=$('#nameInput').value.trim(); if(!name) return;
    const id=(crypto.randomUUID?crypto.randomUUID():'id-'+Date.now()+Math.round(performance.now()));
    me={id,name}; localStorage.setItem('mtt_me',JSON.stringify(me));
    await sb.from('players').insert({id,name});
    render();
  };
}
function renderVoter(){
  if(game.phase==='lobby'){
    APP.innerHTML=`<div id="voter"><div class="vtop"><span class="who"><span class="dot"></span>${esc(me.name)}</span><span class="flav vflav">you're in</span></div>
      <div class="lobbywrap"><div class="pulse"></div><div class="bigstate">You're in, ${esc(me.name)}!</div>
      <div class="status">Eyes up front — the first card's coming.</div></div></div>`;
    return;
  }
  if(game.phase==='awards'){
    APP.innerHTML=`<div id="voter"><div class="lobbywrap">${BEE}<div class="bigstate">That's a wrap 🏆</div><div class="status">Look up — awards on the big screen.</div></div></div>`;
    return;
  }
  const card=CARDS[game.idx]; const mine=votesFor(game.idx)[me.id];
  const t=tally(game.idx);
  const revealed=game.phase==='revealed';
  const sideTxt=c=>`<span class="e">${c.emoji}</span><span class="l">${esc(c.label)}</span>`;
  let bottom;
  if(!mine && !revealed) bottom=`<div class="status">Tap your side 👆</div>`;
  else if(mine && !revealed) bottom=`<div class="status">Locked in. ${t.total} vote${t.total!==1?'s':''} so far…</div>`;
  else { // revealed
    const win = t.A.length===t.B.length?'It\'s a dead heat!':(t.A.length>t.B.length?card.a.label:card.b.label)+' wins';
    const youWith = mine? (mine.choice==='A'?card.a.label:card.b.label):'—';
    bottom=`<div class="bigstate">${esc(win)}</div><div class="status">${mine?`You picked ${esc(youWith)}`:'You sat this one out'}</div>`;
  }
  APP.innerHTML=`<div id="voter">
    <div class="vtop"><span class="who"><span class="dot"></span>${esc(me.name)}</span><span class="flav vflav">${card.flavour}</span></div>
    <div class="vmid">
      <div class="vq">${card.type==='predict'?'Which way does the<br>TEAM lean?':'Pick a side'}</div>
      <div id="choices">
        <button class="choice A ${mine?(mine.choice==='A'?'picked':'dim'):''}" ${revealed?'disabled':''} onclick="castVote('A')"><span class="tick">✓</span>${sideTxt(card.a)}</button>
        <button class="choice B ${mine?(mine.choice==='B'?'picked':'dim'):''}" ${revealed?'disabled':''} onclick="castVote('B')"><span class="tick">✓</span>${sideTxt(card.b)}</button>
      </div>
    </div>
    <div class="vbot">${bottom}</div>
  </div>`;
}

// ---------- ROOM ----------
let qrDrawn=false;
function renderRoom(){
  const joinUrl=PUBLIC_URL;
  if(game.phase==='lobby'){
    APP.innerHTML=`<div id="room"><div class="rtop"><span class="rlogo">${BEE} Mercury</span><span class="rcount">${players.length} in the room</span></div>
      <div class="roomLobby"><div class="rflav flav">team icebreaker</div>
        <h2>This<br><em>or That</em></h2>
        <div class="joinline">Scan to join → <b id="urltxt">${esc(joinUrl.replace(/^https?:\/\//,''))}</b></div>
      </div>
      <div id="qr"><div class="qcap">Scan to play</div><div class="qrbox" id="qrbox"></div><div class="qurl">${esc(joinUrl.replace(/^https?:\/\//,''))}</div></div>
    </div>`;
    drawQR(joinUrl); return;
  }
  if(game.phase==='awards'){ return renderAwards(); }

  const card=CARDS[game.idx]; const t=tally(game.idx);
  const revealed=game.phase==='revealed' && game.reveal_names;
  const total=t.total||1;
  const pA=Math.round(t.A.length/total*100), pB=100-pA;
  const minSide = t.A.length<t.B.length?'A':(t.B.length<t.A.length?'B':null);
  let callout='';
  if(game.phase==='revealed'){
    const ns=minSide==='A'?t.A:t.B; const maj=t.A.length>=t.B.length?card.a:card.b;
    if(t.A.length===t.B.length) callout=`<span class="pill">Dead heat.</span> Someone change their mind — convince the room.`;
    else if(ns.length===0) callout=`<span class="pill">Clean sweep!</span> Every single person picked ${esc(maj.label)} ${maj.emoji}`;
    else{ const m=minSide==='A'?card.a:card.b;
      const who=ns.slice(0,3).join(', ')+(ns.length>3?` +${ns.length-3}`:'');
      callout=`<span class="pill">${esc(m.label)} (${ns.length})</span> ${game.reveal_names?esc(who)+' — defend yourselves! 🎤':'who picked this? Own up. 🎤'}`;
    }
  }
  APP.className=game.phase==='voting'?'voting':'';
  const sideHTML=(c,cls,names,pct,cnt)=>`
    <div class="bar ${cls} ${revealed?'reveal':''}">
      <div class="fill" style="height:${(game.phase==='voting'? (cnt/Math.max(1,players.length)*100) : pct)}%"></div>
      <div class="inner">
        <div><div class="be">${c.emoji}</div><div class="blabel">${esc(c.label)}</div></div>
        <div>
          <div class="bpct">${game.phase==='revealed'?pct+'%':cnt}</div>
          <div class="bcount">${game.phase==='revealed'?cnt+' vote'+(cnt!==1?'s':''):'votes in'}</div>
          <div class="names">${revealed?names.map(esc).join(' · '):''}</div>
        </div>
      </div>
    </div>`;
  APP.innerHTML=`<div id="room" class="${game.phase}">
    <div class="rtop"><span class="rlogo">${BEE} Mercury</span>
      <span class="rcount">${t.total}/${players.length} voted · card ${game.idx+1}</span></div>
    <div class="rmid">
      <div class="rflav flav">${card.type==='predict'?'🔮 predict the team':card.flavour}</div>
      <div class="rq">${card.type==='predict'?'Which way does the team lean?':'This or That?'}</div>
      <div id="bars">
        ${sideHTML(card.a,'A',t.A,pA,t.A.length)}
        ${sideHTML(card.b,'B',t.B,pB,t.B.length)}
      </div>
      <div class="callout ${callout?'show':''}">${callout}</div>
    </div>
    <div id="qr"><div class="qcap">Late? Scan</div><div class="qrbox" id="qrbox"></div><div class="qurl">${esc(joinUrl.replace(/^https?:\/\//,''))}</div></div>
  </div>`;
  drawQR(joinUrl);
}
function renderAwards(){
  const a=computeAwards();
  const card=(title,w,emoji)=>w?`<div class="award"><div class="at">${emoji} ${title}</div><div class="aw">${esc(w.name)}</div><div class="ad">${esc(w.detail)}</div></div>`:'';
  APP.innerHTML=`<div id="room"><div class="rtop"><span class="rlogo">${BEE} Mercury</span><span class="rcount">${players.length} played</span></div>
    <div id="awards"><h2>The Awards 🏆</h2>
      <div class="awardgrid">
        ${card('The Contrarian',a.contrarian,'🦄')}
        ${card('Twins',a.twins,'👯')}
        ${card('The Oracle',a.oracle,'🎯')}
        ${card('Hot Take Champion',a.hot,'🔥')}
      </div>
      <div class="rflav flav" style="margin-top:8px">nicely warmed up. now the real day begins.</div>
    </div></div>`;
}
function drawQR(url){
  const box=$('#qrbox'); if(!box||!window.qrcode) return;
  if(box.dataset.url===url && box.firstChild) return;   // already drawn for this url
  try{
    const qr=qrcode(0,'M'); qr.addData(url); qr.make();
    box.innerHTML=qr.createSvgTag({cellSize:4, margin:0, scalable:true});
    box.dataset.url=url;
  }catch(e){ /* leave blank rather than crash render */ }
}

// ---------- HOST CONSOLE ----------
function renderHost(){
  const card=CARDS[game.idx]; const t=tally(game.idx);
  const voted=new Set(Object.keys(votesFor(game.idx)));
  const notVoted=players.filter(p=>!voted.has(p.id)).map(p=>p.name);
  const minSide=t.A.length<t.B.length?'A':(t.B.length<t.A.length?'B':null);
  const minNames=(minSide==='A'?t.A:minSide==='B'?t.B:[]);
  let callLine;
  if(game.phase!=='revealed') callLine = `▶ Let votes land, then hit Reveal.`;
  else if(t.A.length===t.B.length) callLine=`Dead heat — pick anyone to break the tie out loud.`;
  else if(minNames.length===0) callLine=`Clean sweep — everyone agreed. Ask the most enthusiastic one why it's so obvious.`;
  else callLine = `🎤 Ask ${minNames.slice(0,2).join(' & ')} first — "${(minSide==='A'?card.a.label:card.b.label)}, why?"`;

  const sideBox=(c,arr,lead)=>`<div class="hside ${lead?'lead':''}">
      <div class="sl"><span>${c.emoji} ${esc(c.label)}</span><span class="n">${arr.length}</span></div>
      <div class="names">${game.reveal_names?arr.map(esc).join(', ')||'—':'(hidden)'}</div></div>`;

  const deckRows=CARDS.map((c,i)=>`<div class="drow ${i===game.idx?'cur':''}" onclick="goTo(${i})">
     <span class="di">${i+1}</span><span class="dot" style="color:${flavColor(c.flavour)}">●</span>
     <span class="dq">${c.a.emoji} ${esc(c.a.label)} <span style="opacity:.4">/</span> ${c.b.emoji} ${esc(c.b.label)}</span>
     ${c.spicy?'<span style="color:var(--ui-red);font-weight:700;font-size:12px">SPICY</span>':''}
   </div>`).join('');

  APP.innerHTML=`<div id="host">
    <div class="hbar"><span class="htitle">${BEE} Facilitator console</span>
      <span class="hcount">${t.total}/${players.length} voted</span></div>

    <div class="hcard">
      <div class="hflav"><span class="flav">card ${game.idx+1}/${CARDS.length} · ${card.flavour}</span>${card.spicy?'<span class="spicy">SPICY</span>':''}
        <span style="margin-left:auto" class="flav">${game.phase}</span></div>
      <div class="hq">${card.a.emoji} ${esc(card.a.label)}<span class="vs">vs</span>${card.b.emoji} ${esc(card.b.label)}</div>
      ${card.note?`<div class="hnote">💡 ${esc(card.note)}</div>`:''}
      <div class="hsplit">
        ${sideBox(card.a,t.A, t.A.length>t.B.length)}
        ${sideBox(card.b,t.B, t.B.length>t.A.length)}
      </div>
      <div class="calloutbox">${esc(callLine)}</div>
      ${notVoted.length&&game.phase==='voting'?`<div class="waiting">⏳ Waiting on: ${notVoted.slice(0,8).map(esc).join(', ')}${notVoted.length>8?` +${notVoted.length-8}`:''}</div>`:''}
    </div>

    <div class="controls">
      <button class="btn dark" onclick="goTo(${game.idx-1})" ${game.idx===0?'disabled':''}>◀ Prev</button>
      ${game.phase!=='revealed'
        ? `<button class="btn" onclick="reveal()">Reveal 👀</button>`
        : `<button class="btn dark" onclick="setGame({phase:'voting'})">↩ Re-open</button>`}
      <button class="btn" onclick="goTo(${game.idx+1})" ${game.idx===CARDS.length-1?'disabled':''}>Next ▶</button>
      <label class="toggle"><input type="checkbox" ${game.reveal_names?'checked':''} onchange="toggleNames()"> show names</label>
      <span style="flex:1"></span>
      <button class="btn dark" onclick="toLobby()">Lobby</button>
      <button class="btn on" onclick="toAwards()">Awards 🏆</button>
    </div>

    <div class="deck">${deckRows}</div>
  </div>`;
}
function flavColor(f){return {silly:'#FFF100',nerd:'#69A2B9',mercury:'#358600',reveal:'#E71D36',predict:'#C2CED9'}[f]||'#888';}

// expose for inline onclick
Object.assign(window,{castVote,goTo,reveal,toLobby,toAwards,toggleNames,setGame});

// ===========================================================================
//  BOOT
// ===========================================================================
(async function(){
  try{
    await loadAll();
  }catch(e){ toast('Connection issue — retrying',true); }
  render();
  wireRealtime();
  // gentle re-poll safety net in case a realtime event is missed —
  // only re-render when something actually changed (no idle rebuilds).
  setInterval(async()=>{ try{ await loadAll(); if(stateSig()!==lastSig) render(); }catch(e){} }, 5000);
})();
</script>
</body>
